<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — Ordito Docs</title>
  <!-- デザイントークン＋コンポーネントCSSはテンプレート所有。AIは触れない。 -->
  <style>{{STYLES}}</style>
</head>
<body class="ordito">
  <!-- ===== 枠（テンプレート固定。AIは生成しない） ===== -->
  <header class="site-header">
    <a class="site-header__brand" href="{{HOME}}">Ordito Docs</a>
    <span class="site-header__tag">構造は JSON で固定。言葉は AI が書く。</span>
  </header>
  <div class="layout">
    <nav class="site-nav" aria-label="ドキュメント">
      <!-- モバイル専用の開閉トグル（CSSのみ・JS不要）。デスクトップでは隠す。 -->
      <input type="checkbox" id="site-nav-toggle" class="site-nav__toggle">
      <label for="site-nav-toggle" class="site-nav__hamburger">☰ メニュー</label>
      <div class="site-nav__panel">
        <p class="site-nav__title">ドキュメント</p>
        <ul class="site-nav__list">{{NAV}}</ul>
        <p class="site-nav__meta">{{META}}</p>
      </div>
    </nav>
    <!-- ===== 本文差し込み口（content_slot = #doc-body） ===== -->
    <!-- この #doc-body の内側だけが、IR から生成される本文領域。 -->
    <main class="content" id="doc-body">
{{CONTENT}}
    </main>
  </div>
  <footer class="site-footer">
    <span>Generated by Ordito · template: dev-docs-terminal</span>
  </footer>
</body>
</html>

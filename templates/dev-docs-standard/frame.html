<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — Ordito Docs</title>
  <!-- デザイントークン＋コンポーネントCSSはテンプレート所有。AIは触れない。 -->
  <style>{{STYLES}}</style>
</head>
<body class="ordito">
  <!-- ===== 枠（テンプレート固定。AIは生成しない） ===== -->
  <header class="site-header">
    <a class="site-header__brand" href="index.html">Ordito Docs</a>
    <span class="site-header__tag">構造を先に張り、その上にAIが本文を織る</span>
  </header>
  <div class="layout">
    <nav class="site-nav" aria-label="ドキュメント">
      <p class="site-nav__title">ガイド</p>
      <ul class="site-nav__list">{{NAV}}</ul>
      <p class="site-nav__meta">{{META}}</p>
    </nav>
    <!-- ===== 本文差し込み口（content_slot = #doc-body） ===== -->
    <!-- この #doc-body の内側だけが、IR から生成される本文領域。 -->
    <main class="content" id="doc-body">
{{CONTENT}}
    </main>
  </div>
  <footer class="site-footer">
    <span>Generated by Ordito POC engine · template: dev-docs-standard</span>
  </footer>
</body>
</html>

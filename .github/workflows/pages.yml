# Deploy Ordito docs (samples/ir → samples/site) to GitHub Pages via Actions.
# Repo Settings → Pages → Source must be set to "GitHub Actions".
name: Deploy docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'samples/**'
      - 'reference/**'
      - '.claude/skills/**'
      - 'ordito.config.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate docs site
        run: echo '{}' | node .claude/skills/ordito-generate/generate.js
      - name: Validate
        run: echo '{}' | node .claude/skills/ordito-validate/validate.js
      - name: Strip internal report.json
        run: rm -f samples/site/report.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: samples/site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
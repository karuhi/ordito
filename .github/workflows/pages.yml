# Deploy this repo's own demo (samples/site) to GitHub Pages via Actions.
# Replaces the old scripts/deploy-pages.sh (gh-pages branch force-push).
# Repo Settings → Pages → Source must be set to "GitHub Actions".
name: Deploy demo (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'samples/**'
      - 'reference/**'
      - 'ordito.config.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Regenerate the sample site from ordito.config.json (out = samples/site).
      - name: Build sample site
        run: node reference/engine/generate.js
      - name: Strip internal report.json
        run: rm -f samples/site/report.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: samples/site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
